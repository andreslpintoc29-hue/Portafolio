<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISOR ANTIGRAVITY - REGISTRO DE TUTELA</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* PARCHE LOCALIZADO PARA LA MARCA DE AGUA */
        .watermark-shield {
            position: absolute;
            bottom: 45px; /* Encima de los controles de Google */
            right: 0;
            width: 200px; /* Solo el ancho necesario */
            height: 50px;
            background: #000;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <iframe src="https://docs.google.com/presentation/d/1Rqo5ZTdM79PkWZAWkN2qfo1NOAMR3OOX/embed?start=false&loop=false&delayms=3000" allowfullscreen="true"></iframe>
        <div class="watermark-shield"></div>
    </div>
</body>
</html>
