<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISOR VIDEO - REPARTO TYBA</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* MEGA PARCHE PARA LA MARCA DE AGUA (30% DEL ANCHO) */
        .watermark-shield {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30%;
            height: 70px;
            background: #000;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <!-- VIDEO DE REPARTO TYBA ACTIVADO -->
        <iframe id="video-frame" src="https://drive.google.com/file/d/1-yIcRphMsQXJRTiDLdMs06WbQzaxek2Q/preview" allowfullscreen="true"></iframe>
        <div class="watermark-shield"></div>
    </div>
</body>
</html>
