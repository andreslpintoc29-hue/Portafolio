<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISOR VIDEO - REGISTRO DE TUTELA</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 255, 255, 0.2);
            color: #00f5ff;
            border: 1px solid #00f5ff;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <!-- Puedes cambiar el src por tu video real cuando lo tengas -->
        <video controls autoplay>
            <source src="" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>
</body>
</html>
